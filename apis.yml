    name: RAML Specification
    description: >-
      The RAML (RESTful API Modeling Language) specification defines a
      YAML 1.2-based language for describing HTTP-based APIs. RAML 1.0 introduces
      a unified type system, annotations, libraries, overlays, extensions, and
      improved OAuth support over RAML 0.8.
