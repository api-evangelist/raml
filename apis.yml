aid: raml
name: RAML
description: >-
  RAML (RESTful API Modeling Language) is a YAML-based specification language
  for describing RESTful APIs with first-class support for reusable patterns,
  traits, resource types, data type annotations, libraries, overlays, and
  extensions. Developed by MuleSoft and Salesforce, RAML 1.0 is the current
  stable version. The raml-org GitHub organization maintains the canonical
  specification and related tooling, all of which are archived and read-only
  as of February 2024.
